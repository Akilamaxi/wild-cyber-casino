services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    restart: unless-stopped
    networks: [backend]

  postgres:
    image: postgres:15.13-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_DB=cyber_casino
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyber_casino"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  payout-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
      - PGHOST=postgres
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - PGDATABASE=cyber_casino
      - PGPORT=5432
      - RUN_WORKER_CONCURRENTLY=false
    working_dir: /app/apps/payout-worker
    command: ["npm", "run", "start:prod"]
    restart: unless-stopped
    init: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: [backend]

  loyalty-engine:
    build:
      context: .
      dockerfile: Dockerfile
    expose: ["5002"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5002
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
      - PGHOST=postgres
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - PGDATABASE=cyber_casino
      - PGPORT=5432
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
    working_dir: /app/apps/loyalty-engine
    command: ["npm", "run", "start:prod"]
    restart: unless-stopped
    init: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: [backend]

  backoffice-api:
    build:
      context: .
      dockerfile: Dockerfile
    expose: ["5001"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5001
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
      - PGHOST=postgres
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - PGDATABASE=cyber_casino
      - PGPORT=5432
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET}
      - ADMIN_CORS_ORIGINS=${ADMIN_CORS_ORIGINS:-http://localhost:8080}
    working_dir: /app/apps/backoffice-api
    command: ["npm", "run", "start:prod"]
    restart: unless-stopped
    init: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: [backend]

  lottery-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=8080
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
      - PGHOST=postgres
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - PGDATABASE=cyber_casino
      - PGPORT=5432
      - RUN_WORKER_CONCURRENTLY=false
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
    working_dir: /app/apps/lottery-engine
    command: ["npm", "run", "start:prod"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/lottery/games').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    init: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: [backend]

volumes:
  pg-data:

networks:
  backend:
    internal: true
